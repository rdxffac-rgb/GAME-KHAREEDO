<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback | VIP SMM SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* LIGHT THEME TO MATCH YOUR WEBSITE */
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-color: #4f46e5; /* Indigo */
            --star-color: #fbbf24;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .rating-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 50px;
            border: 1px solid #e2e8f0;
        }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 800; color: #0f172a; }

        /* Video Section */
        .video-guide-section {
            width: 100%;
            margin-bottom: 35px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Star Input */
        .star-input {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 35px;
            cursor: pointer;
            margin-bottom: 25px;
        }
        .star-input i { color: #e2e8f0; transition: 0.3s; }
        .star-input i.active { color: var(--star-color); transform: scale(1.1); }

        /* Form */
        #feedback-box {
            display: none;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }
        input, textarea {
            width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .btn-submit {
            background: linear-gradient(180deg, #6366F1 0%, #4F46E5 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0px #3730A3;
        }
        .btn-submit:active { transform: translateY(2px); box-shadow: 0 2px 0px #3730A3; }

        /* Review Cards */
        .review-card {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .user-name { font-weight: 700; color: #1e293b; }
        .time-ago { font-size: 12px; color: var(--text-muted); float: right; }
        .review-text { margin: 12px 0; font-size: 15px; color: #475569; line-height: 1.5; }

        .actions { display: flex; gap: 20px; margin-top: 10px; border-top: 1px solid #f8fafc; padding-top: 10px; }
        .action-btn { cursor: pointer; color: #94a3b8; font-size: 14px; font-weight: 600; }
        .action-btn.liked { color: #4f46e5; }
        .action-btn.disliked { color: #f43f5e; }

        .loader { display: none; text-align: center; padding: 20px; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="rating-container">
    <h2>Verified User Reviews</h2>

    <div class="video-guide-section">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CgOeFyroHgU" allowfullscreen></iframe>
        </div>
    </div>
    
    <div class="star-input" id="star-selector">
        <i class="fa-solid fa-star" data-val="1"></i>
        <i class="fa-solid fa-star" data-val="2"></i>
        <i class="fa-solid fa-star" data-val="3"></i>
        <i class="fa-solid fa-star" data-val="4"></i>
        <i class="fa-solid fa-star" data-val="5"></i>
    </div>

    <div id="feedback-box">
        <input type="text" id="inp-name" placeholder="Enter Your Name">
        <textarea id="inp-comment" rows="3" placeholder="Share your experience..."></textarea>
        <button class="btn-submit" onclick="handleUserRating()">SUBMIT RATING</button>
    </div>

    <div id="main-loader" class="loader">
        <div class="spinner"></div>
        <p>Verifying...</p>
    </div>

    <div id="reviews-feed"></div>

    <div class="see-more-container">
        <button class="btn-submit" style="width: auto; padding: 12px 50px;" id="btn-load-more" onclick="loadMoreReviews()">SEE MORE</button>
        <div id="more-loader" class="loader"><div class="spinner"></div></div>
    </div>
</div>

<script>
    // UNIQUE NAME & COMMENT GENERATOR (Anti-Repeat)
    const names = ["Rahul", "Priya", "Amit", "Sneha", "Vikram", "Anjali", "Suresh", "Neha", "Mohit", "Pooja", "Arjun", "Karan", "Suhani"];
    const surnames = ["Sharma", "Verma", "Singh", "Yadav", "Gupta", "Rajput", "Meena", "Kumar"];
    
    // MIXED CONTENT DATABASE
    const comments = [
        "Bhai gazab service hai! maza aa gaya. kahkwkajs fast delivery.",
        "Everything is working perfectly. Best panel for Instagram followers.",
        "Maine Amazon Prime liya tha, instantly mil gaya. Thank you VIP SMM!",
        "YouTube watchtime badhiya hai, non-drop service hai. Very professional.",
        "Sasta aur sabse tez. Recharge turant ho gaya. Hello everyone try this.",
        "Insta followers instantly mil gaye. mast h yaar! hahahaha",
        "Very fast service. Payment verify hote hi order start ho gaya. Very Professional.",
        "₹120 me Jio recharge? unbelievable deal. VIP SMM is king.",
        "Main pehle dar raha tha par ye real hai. Guys go for it! hshsjaks",
        "Pura line professional: Exceptional quality and timely delivery of social services.",
        "Bhai sachi me followers milte h, maine khud try kiya h.",
        "Quick response from support. Premium deals are actually working.",
        "Maza aa gaya! Itni sasti monetization pack kahin nahi dekhi.",
        "Link verify hote hi kaam shuru. hi, mast panel hai ye."
    ];

    const times = ["2 hours ago", "5 hours ago", "1 day ago", "3 days ago", "1 week ago", "1 month ago", "8 months ago", "1 year ago"];

    let usedReviewKeys = new Set();

    function generateUniqueReview() {
        let name, comment, time, key;
        do {
            name = names[Math.floor(Math.random() * names.length)] + " " + surnames[Math.floor(Math.random() * surnames.length)];
            comment = comments[Math.floor(Math.random() * comments.length)];
            time = times[Math.floor(Math.random() * times.length)];
            key = name + comment; 
        } while (usedReviewKeys.has(key) && usedReviewKeys.size < 500);

        usedReviewKeys.add(key);

        return {
            name: name,
            time: time,
            text: comment,
            likes: Math.floor(Math.random() * 5950) + 50,
            dislikes: Math.floor(Math.random() * 20) + 1
        };
    }

    // FORM & STAR LOGIC
    const starIcons = document.querySelectorAll('.star-input i');
    starIcons.forEach(star => {
        star.addEventListener('click', () => {
            const val = star.getAttribute('data-val');
            starIcons.forEach((s, idx) => s.classList.toggle('active', idx < val));
            document.getElementById('feedback-box').style.display = 'block';
        });
    });

    function handleUserRating() {
        const name = document.getElementById('inp-name').value;
        if(!name) return alert("Enter name!");
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('main-loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('main-loader').innerHTML = `<h3>✅ Thanks, ${name}!</h3>`;
            setTimeout(() => { location.reload(); }, 2000);
        }, 2500);
    }

    function injectReviews(count) {
        const feed = document.getElementById('reviews-feed');
        for(let i=0; i<count; i++) {
            const r = generateUniqueReview();
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div><span class="user-name">${r.name}</span><span class="time-ago">${r.time}</span></div>
                <div style="color:var(--star-color); font-size:10px; margin:5px 0;">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
                <p class="review-text">${r.text}</p>
                <div class="actions">
                    <span class="action-btn" onclick="toggleLike(this, ${r.likes})"><i class="fa-solid fa-thumbs-up"></i> <span>${r.likes}</span></span>
                    <span class="action-btn" onclick="toggleDislike(this, ${r.dislikes})"><i class="fa-solid fa-thumbs-down"></i> <span>${r.dislikes}</span></span>
                </div>
            `;
            feed.appendChild(card);
        }
    }

    function loadMoreReviews() {
        document.getElementById('btn-load-more').style.display = 'none';
        document.getElementById('more-loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('more-loader').style.display = 'none';
            document.getElementById('btn-load-more').style.display = 'inline-block';
            injectReviews(10);
        }, 1500);
    }

    function toggleLike(btn, val) {
        if(btn.classList.contains('liked')) return;
        btn.classList.add('liked');
        btn.querySelector('span').innerText = val + 1;
    }

    function toggleDislike(btn, val) {
        if(btn.classList.contains('disliked')) return;
        btn.classList.add('disliked');
        btn.querySelector('span').innerText = val + 1;
    }

    window.onload = () => injectReviews(10);
</script>

</body>
</html>
