<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback & Guide | VIP SMM SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --accent-color: #38bdf8;
            --star-color: #fbbf24;
            --text-main: #f1f5f9;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism Container */
        .rating-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        h2 { text-align: center; margin-bottom: 20px; font-size: 26px; letter-spacing: 1px; }

        /* --- VIDEO SECTION ADDED --- */
        .video-guide-section {
            width: 100%;
            margin-bottom: 35px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-title {
            text-align: center;
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--accent-color);
            font-weight: 600;
            display: block;
        }

        /* Star Input Section */
        .star-input {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 35px;
            cursor: pointer;
            margin-bottom: 25px;
        }
        .star-input i { color: #334155; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .star-input i.active { color: var(--star-color); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); transform: scale(1.2); }

        /* Feedback Form Area */
        #feedback-box {
            display: none;
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px dashed rgba(56, 189, 248, 0.3);
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }

        input, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent-color); }

        .btn-submit {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        /* Loader */
        .loader { display: none; text-align: center; padding: 30px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Reviews Feed */
        .reviews-list { width: 100%; }
        .review-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .review-card:hover { background: rgba(255,255,255,0.05); }

        .review-header { display: flex; justify-content: space-between; align-items: center; }
        .user-name { font-weight: 700; color: var(--accent-color); font-size: 17px; }
        .time-ago { font-size: 12px; color: #64748b; }
        .review-text { margin: 12px 0; font-size: 15px; color: #cbd5e1; line-height: 1.6; }
        
        /* Actions */
        .actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; color: #94a3b8; transition: 0.2s; font-size: 14px; }
        .action-btn.liked { color: #38bdf8; transform: scale(1.1); }
        .action-btn.disliked { color: #f43f5e; transform: scale(1.1); }

        .see-more-container { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

<div class="rating-container">
    <h2><i class="fa-solid fa-star-half-stroke"></i> Customer Feedback</h2>

    <div class="video-guide-section">
        <span class="video-title"><i class="fa-solid fa-circle-play"></i> Watch: How to use VIP SMM Shop</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CgOeFyroHgU" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>
    
    <div class="star-input" id="star-selector">
        <i class="fa-solid fa-star" data-val="1"></i>
        <i class="fa-solid fa-star" data-val="2"></i>
        <i class="fa-solid fa-star" data-val="3"></i>
        <i class="fa-solid fa-star" data-val="4"></i>
        <i class="fa-solid fa-star" data-val="5"></i>
    </div>

    <div id="feedback-box">
        <input type="text" id="inp-name" placeholder="Apna Naam Likhein...">
        <textarea id="inp-comment" rows="3" placeholder="Apna experience share karein (e.g. Recharge ya followers kaise mile?)..."></textarea>
        <button class="btn-submit" onclick="handleUserRating()">SUBMIT RATING NOW</button>
    </div>

    <div id="main-loader" class="loader">
        <div class="spinner"></div>
        <p id="loader-msg" style="margin-top:15px; color:var(--accent-color);">Verifying your feedback...</p>
    </div>

    <div class="reviews-list" id="reviews-feed">
        </div>

    <div class="see-more-container">
        <button class="btn-submit" style="width: auto; padding: 12px 50px;" id="btn-load-more" onclick="loadMoreReviews()">SEE MORE</button>
        <div id="more-loader" class="loader"><div class="spinner"></div></div>
    </div>
</div>

<script>
    const rawNames = ["Aman", "Rohan", "Priya", "Sneha", "Vikram", "Rahul", "Suresh", "Anjali", "Deepak", "Manish", "Kavita", "Sahil", "Neha", "Aaryan", "Suhani", "Mohit", "Ishaan", "Pooja", "Arjun", "Vivek"];
    const rawSurnames = ["Sharma", "Verma", "Meena", "Yadav", "Singh", "Gupta", "Rajput", "Kumar", "Choudhary", "Das"];
    const rawComments = [
        "Bhai mast service hai! Instagram followers instantly mil gaye. ❤️",
        "Best SMM Panel. YouTube watchtime service non-drop hai.",
        "Recharge process fast hai, ₹120 me Jio ka recharge mil gaya!",
        "Amazon Prime subscription 5 min me mil gaya. Working fine!",
        "Trustworthy site. Support team bahut badhiya hai.",
        "Facebook likes liye the, result amazing hai. Sasta aur tez!",
        "VIP SMM is genuine. Abhi YouTube monetization pack order kiya h.",
        "Discord nitro aur gaming services sab mast kaam kar rahi hain.",
        "Itni sasti service kahin nahi dekhi. ₹499 me monetization!",
        "Great experience! Link dala aur verify kiya, turant kaam ho gaya.",
        "Vipsmm shop is king. Mere 500k followers wale dost ne suggest kiya tha.",
        "Link verify karke payment kiya, recharge turant ho gaya.",
        "Netflix aur Prime ke deals insane hain yahan.",
        "Everything is perfect. QR code se payment karna easy hai."
    ];
    const rawTimes = ["2 hours ago", "5 hours ago", "1 day ago", "3 days ago", "1 week ago", "2 weeks ago", "1 month ago", "3 months ago", "8 months ago", "1 year ago"];

    let usedReviewKeys = new Set();

    function generateUniqueReview() {
        let name, comment, time, key;
        do {
            const fName = rawNames[Math.floor(Math.random() * rawNames.length)];
            const lName = rawSurnames[Math.floor(Math.random() * rawSurnames.length)];
            name = fName + " " + lName;
            comment = rawComments[Math.floor(Math.random() * rawComments.length)];
            time = rawTimes[Math.floor(Math.random() * rawTimes.length)];
            key = name + comment;
        } while (usedReviewKeys.has(key) && usedReviewKeys.size < 500);

        usedReviewKeys.add(key);

        return {
            name: name,
            time: time,
            text: comment,
            likes: Math.floor(Math.random() * 5950) + 50,
            dislikes: Math.floor(Math.random() * 20) + 1
        };
    }

    const starIcons = document.querySelectorAll('.star-input i');
    starIcons.forEach(star => {
        star.addEventListener('click', () => {
            const val = star.getAttribute('data-val');
            starIcons.forEach((s, index) => {
                s.classList.toggle('active', index < val);
            });
            document.getElementById('feedback-box').style.display = 'block';
        });
    });

    function handleUserRating() {
        const uName = document.getElementById('inp-name').value;
        if(!uName) return alert("Please enter your name!");
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('main-loader').style.display = 'block';

        setTimeout(() => {
            document.getElementById('main-loader').innerHTML = `
                <div style="color:var(--accent-color);">
                    <i class="fa-solid fa-circle-check" style="font-size:40px;"></i>
                    <h3 style="margin-top:15px;">Thanks for rating, ${uName}!</h3>
                </div>`;
            setTimeout(() => { location.reload(); }, 2000);
        }, 2500);
    }

    function injectReviews(count) {
        const feed = document.getElementById('reviews-feed');
        for(let i=0; i<count; i++) {
            const r = generateUniqueReview();
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div class="review-header">
                    <span class="user-name">${r.name}</span>
                    <span class="time-ago">${r.time}</span>
                </div>
                <div style="color: var(--star-color); font-size:12px; margin: 8px 0;">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
                <p class="review-text">${r.text}</p>
                <div class="actions">
                    <div class="action-btn" onclick="toggleAction(this, ${r.likes}, 'like')">
                        <i class="fa-solid fa-thumbs-up"></i> <span class="count">${r.likes}</span>
                    </div>
                    <div class="action-btn" onclick="toggleAction(this, ${r.dislikes}, 'dislike')">
                        <i class="fa-solid fa-thumbs-down"></i> <span class="count">${r.dislikes}</span>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        }
    }

    function loadMoreReviews() {
        document.getElementById('btn-load-more').style.display = 'none';
        document.getElementById('more-loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('more-loader').style.display = 'none';
            document.getElementById('btn-load-more').style.display = 'inline-block';
            injectReviews(10);
        }, 1500);
    }

    function toggleAction(btn, baseValue, type) {
        if(btn.classList.contains('liked') || btn.classList.contains('disliked')) return;
        btn.classList.add(type === 'like' ? 'liked' : 'disliked');
        btn.querySelector('.count').innerText = baseValue + 1;
    }

    window.onload = () => injectReviews(10);
</script>

</body>
</html>
