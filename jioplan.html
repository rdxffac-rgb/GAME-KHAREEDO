<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VipSmm | Jio Premium Offers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1a1a1a; }
        .recharge-card { background: white; border-radius: 35px; padding: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.05), inset 0 1px 0 #fff, inset 0 -4px 0 rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .btn-3d { background: linear-gradient(180deg, #6366F1 0%, #4F46E5 100%); color: white; padding: 12px 20px; border-radius: 18px; font-weight: 800; box-shadow: 0 5px 0px #3730A3, 0 8px 15px rgba(79, 70, 229, 0.3); transition: all 0.1s ease; display: flex; align-items: center; justify-content: center; min-width: 130px; }
        .btn-3d:active { transform: translateY(3px); box-shadow: 0 2px 0px #3730A3; }
        .loader { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-group { background: white; border: 2px solid #e2e8f0; border-radius: 20px; display: flex; align-items: center; padding: 10px 15px; }
    </style>
</head>
<body class="bg-gray-50 pb-10">

    <nav class="flex items-center justify-between px-6 py-5 bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center"><span class="text-white font-extrabold text-2xl">V</span></div>
            <span class="text-2xl font-extrabold">VipSmm <span class="text-indigo-600">Offers</span></span>
        </div>
    </nav>

    <div class="px-5 mt-6" id="numberInputSection">
        <div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-100">
            <label class="block text-sm font-bold text-gray-700 mb-3">Enter Jio Mobile Number</label>
            <div class="input-group">
                <img src="https://flagcdn.com/w20/in.png" class="mr-2 rounded-sm">
                <span class="font-bold text-gray-700 mr-2">+91</span>
                <input type="tel" id="mobileNumber" maxlength="10" placeholder="00000 00000" class="w-full bg-transparent outline-none font-bold text-gray-800">
            </div>
            <button onclick="confirmNumber(this)" class="w-full mt-4 bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow-lg flex items-center justify-center">
                <div class="loader" id="confirmLoader"></div>
                <span id="confirmText">Confirm Number</span>
            </button>
        </div>
    </div>

    <div class="px-5 mt-8">
        <div class="space-y-6">
            <div class="recharge-card border-l-8 border-indigo-600">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center space-x-2"><span class="text-sm line-through text-gray-400">₹349</span><span class="text-2xl font-black text-indigo-600">₹120</span></div>
                        <p class="text-sm font-bold text-gray-700">Validity: 28 Days</p>
                    </div>
                </div>
                <div class="mt-4 text-xs font-bold text-indigo-600 bg-indigo-50 p-2 rounded-lg display-num hidden">Recharging for: <span class="target-num"></span></div>
                <div class="mt-6 flex justify-end">
                    <button onclick="startRecharge(this, 'payment', 'Jio Recharge 120', 120)" class="btn-3d"><div class="loader"></div><span>Recharge</span></button>
                </div>
            </div>
            <div class="recharge-card border-l-8 border-emerald-500">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center space-x-2"><span class="text-sm line-through text-gray-400">₹899</span><span class="text-2xl font-black text-emerald-600">₹348</span></div>
                        <p class="text-sm font-bold text-gray-700">Validity: 90 Days</p>
                    </div>
                </div>
                <div class="mt-4 text-xs font-bold text-emerald-600 bg-emerald-50 p-2 rounded-lg display-num hidden">Recharging for: <span class="target-num"></span></div>
                <div class="mt-6 flex justify-end">
                    <button onclick="startRecharge(this, 'payment', 'Jio Recharge 348', 348)" class="btn-3d" style="background: linear-gradient(180deg, #10B981 0%, #059669 100%);"><div class="loader"></div><span>Recharge</span></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmNumber(btn) {
            const num = document.getElementById('mobileNumber').value;
            const loader = document.getElementById('confirmLoader');
            const text = document.getElementById('confirmText');
            if(num.length === 10) {
                loader.style.display = 'inline-block';
                text.innerText = 'Verifying...';
                setTimeout(() => {
                    const fullNum = "+91 " + num;
                    // Only save for JIO category
                    localStorage.setItem('jioTarget', fullNum);
                    document.getElementById('numberInputSection').style.display = 'none';
                    document.querySelectorAll('.display-num').forEach(div => div.classList.remove('hidden'));
                    document.querySelectorAll('.target-num').forEach(span => span.innerText = fullNum);
                }, 2000);
            } else { alert("Enter valid 10 digit number"); }
        }

        function startRecharge(btn, page, plan, price) {
            const savedNum = localStorage.getItem('jioTarget');
            if(!savedNum) { alert("Please confirm number first!"); return; }
            
            const loader = btn.querySelector('.loader');
            const span = btn.querySelector('span');
            loader.style.display = 'inline-block';
            span.innerText = 'Processing...';

            // IMPORTANT: Clear other category data to avoid conflict
            localStorage.removeItem('ytTarget');
            localStorage.removeItem('instaUser');
            
            localStorage.setItem('selectedPlan', plan);
            localStorage.setItem('selectedPrice', price);
            localStorage.setItem('finalTarget', savedNum); // Common target for payment page

            setTimeout(() => { window.location.href = page + ".html"; }, 3000);
        }
    </script>
</body>
</html>
