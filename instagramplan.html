<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Services | VipSmm Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1a1a1a; }
        .premium-3d-card { background: white; border-radius: 30px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-left: 6px solid #E1306C; margin-bottom: 20px; transition: 0.3s; }
        .input-3d { background: white; border-radius: 20px; border: 2px solid #f1f5f9; transition: all 0.3s ease; }
        .input-3d:focus { border-color: #E1306C; box-shadow: 0 0 0 4px rgba(225, 48, 108, 0.1); outline: none; }
        
        /* Error Shake */
        .error-shake { border-color: #ef4444 !important; animation: shake 0.2s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .btn-3d { background: linear-gradient(180deg, #E1306C 0%, #C13584 100%); color: white; border-radius: 16px; font-weight: 700; box-shadow: 0 4px 0px #833AB4; transition: all 0.1s ease; display: flex; align-items: center; justify-content: center; }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 2px 0px #833AB4; }
        
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

    <nav class="flex items-center justify-between px-6 py-5 sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-arrow-left text-gray-600"></i>
            </a>
            <span class="text-2xl font-extrabold tracking-tighter">Insta <span class="text-[#E1306C]">Boost</span></span>
        </div>
    </nav>

    <div class="px-5 mt-6">
        <div class="premium-3d-card border-none" id="verifyBox">
            <label class="block text-sm font-bold text-gray-700 mb-3">Paste Instagram Profile/Post Link</label>
            <input type="text" id="instaLink" placeholder="https://www.instagram.com/username" class="w-full p-4 input-3d">
            <button onclick="verifyLink()" id="verifyBtn" class="w-full mt-4 p-4 btn-3d">
                <div class="loader" id="confirmLoader"></div>
                <span id="btnText">Verify Account</span>
            </button>
        </div>
    </div>

    <div class="px-5 mt-8 hidden" id="plansSection">
        <h2 class="text-xl font-extrabold text-gray-800 mb-6">Select a Premium Plan</h2>
        
        <div class="space-y-4">

            <div class="premium-3d-card border-l-6 border-indigo-600 bg-indigo-50/30">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-extrabold text-lg text-indigo-700">500 Real Indian Followers <span class="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded-full ml-2">PROMO</span></h3>
                        <p class="text-xs text-gray-500">Real Users • High Quality • Fast Delivery</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-indigo-600">₹28</span>
                        <button onclick="buyNow(this, 'Instagram (500 Real Followers)', 28, 'Real Indian Profiles, Instant Start, High Retention, Safe Account Growth')" class="block mt-2 px-6 py-2 btn-3d text-sm" style="background: linear-gradient(180deg, #4F46E5 0%, #4338CA 100%); box-shadow: 0 4px 0px #312E81;">
                            <div class="loader"></div><span>Buy</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="premium-3d-card">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-extrabold text-lg">1000 Followers</h3>
                        <p class="text-xs text-gray-500">Indian Real Non-drop Followers</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-[#E1306C]">₹49</span>
                        <button onclick="buyNow(this, 'Instagram (1000 Followers)', 49, 'Real Indian Users, Permanent Non-drop, Organic Speed, Boost Profile Visibility')" class="block mt-2 px-6 py-2 btn-3d text-sm">
                            <div class="loader"></div><span>Buy</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="premium-3d-card">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-extrabold text-lg">50000 Reel Views</h3>
                        <p class="text-xs text-gray-500">Boost views on your Instagram reels</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-[#E1306C]">₹45</span>
                        <button onclick="buyNow(this, 'Instagram (50000 Reel Views)', 45, 'Explosive Reach, Higher Explore Page Chance, High Quality Views, Fast Start')" class="block mt-2 px-6 py-2 btn-3d text-sm">
                            <div class="loader"></div><span>Buy</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let isConfirmed = false;

        function verifyLink() {
            const link = document.getElementById('instaLink').value;
            const loader = document.getElementById('confirmLoader');
            const btnText = document.getElementById('btnText');
            const input = document.getElementById('instaLink');

            if (link.includes('instagram.com')) {
                input.classList.remove('error-shake');
                loader.style.display = 'block';
                btnText.innerText = "Verifying Profile...";

                const parts = link.split('/');
                const username = parts[3] || "User";

                setTimeout(() => {
                    loader.style.display = 'none';
                    btnText.innerText = "Verified: @" + username;
                    document.getElementById('verifyBtn').style.background = "#059669"; 
                    document.getElementById('verifyBtn').style.boxShadow = "0 4px 0px #065f46";

                    isConfirmed = true;
                    localStorage.setItem('instaUser', username);
                    document.getElementById('plansSection').classList.remove('hidden');
                    document.getElementById('plansSection').scrollIntoView({ behavior: 'smooth' });
                }, 2000);
            } else {
                input.classList.add('error-shake');
            }
        }

        function buyNow(btn, plan, price, benefits) {
            if(!isConfirmed) {
                document.getElementById('instaLink').classList.add('error-shake');
                document.getElementById('verifyBox').scrollIntoView({behavior: 'smooth'});
                return;
            }

            const loader = btn.querySelector('.loader');
            const span = btn.querySelector('span');
            loader.style.display = 'block';
            span.innerText = "Processing...";

            // Sending data to Payment Page
            localStorage.setItem('selectedPlan', plan);
            localStorage.setItem('selectedPrice', price);
            localStorage.setItem('planBenefits', benefits);
            localStorage.setItem('finalTarget', "@" + localStorage.getItem('instaUser'));

            setTimeout(() => {
                window.location.href = "payment.html"; 
            }, 2000);
        }

        window.addEventListener('pageshow', function () {
            document.querySelectorAll('.loader').forEach(l => l.style.display = 'none');
            document.querySelectorAll('.btn-3d span').forEach(s => { if(s.innerText === 'Processing...') s.innerText = 'Buy'; });
        });
    </script>
</body>
</html>
